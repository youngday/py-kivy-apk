name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'           # 推送形如 v1.0, v2.0.1 的 tag 时触发
  workflow_dispatch:    # 允许在 GitHub 页面手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            libc6-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libsqlite3-dev

      - name: Install Buildozer
        run: |
          pip install buildozer

      - name: Set up Android SDK and accept licenses
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          CMDLINE_TOOLS=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          # Create symlink for buildozer compatibility (looks for tools/bin/sdkmanager)
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $CMDLINE_TOOLS $ANDROID_HOME/tools/bin/sdkmanager
          # Accept all licenses
          yes | $CMDLINE_TOOLS --licenses || true
          # Install required SDK components
          yes | $CMDLINE_TOOLS "build-tools;34.0.0" "platforms;android-34" "platform-tools" || true

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload APK to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/*.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact (for branch pushes)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
